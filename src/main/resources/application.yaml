spring:
  profiles:
    active: dev
  messages:
    basename: messages
    encoding: UTF-8
  application:
    name: theelderforge
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB